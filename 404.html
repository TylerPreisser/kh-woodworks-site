<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>KH Woodworks</title>
<script>
  (function () {
    var repoBase = "/kh-woodworks-site/";
    var isGithubPages = /\.github\.io$/.test(location.hostname);
    var base = isGithubPages || location.pathname.indexOf(repoBase) === 0 ? repoBase : "/";
    location.replace(location.origin + base + location.search + location.hash);
  }());
</script>
</head>
<body>
<p><a href="/">Go to KH Woodworks</a></p>
<p><a href="/kh-woodworks-site/">Open the GitHub Pages mirror</a></p>
</body>
</html>
